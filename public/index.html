<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal MMA</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header class="topo">Portal MMA</header>

<section class="login">
  <h1>Login</h1>
  <div class="login-form">
    <input type="text" placeholder="Usuário" required>
    <input type="password" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </div>
</section>

<div class="container-fluid">
  <div class="row">

    <aside class="menu col-12 col-md-2 d-flex flex-column gap-2 py-3">
      <a href="#">Início</a>
      <a href="#">Sobre</a>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
      <a href="#">Blog</a>
    </aside>

    <main class="conteudo col-12 col-md-10">

      <div class="banner">MMA Highlights</div>

      <h2>Seção 1</h2>
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <div class="bloco">
            <h3>ILIA TOPURIA</h3>
            <a href="https://www.espn.com.br/mma/lutador/_/id/4350812/ilia-topuria">Ver perfil</a>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="bloco">
            <h3>CHARLES DO BRONX</h3>
            <a href="https://www.espn.com.br/mma/lutador/_/id/2504169/charles-oliveira">Ver perfil</a>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="bloco">
            <h3>MMA CONTENT</h3>
            Highlights e informações
          </div>
        </div>
      </div>

      <h2 class="mt-4">Seção 2</h2>
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <div class="bloco">
            <iframe width="100%" height="150"
            src="https://www.youtube.com/embed/R1XTF1Eyp4k?si=vS8kNw9bmNOLXS3G"></iframe>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="bloco">
            <iframe width="100%" height="150"
            src="https://www.youtube.com/embed/wqbo2qJeRYg?si=7mekpt9ojkFrzfOj"></iframe>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="bloco">Mais vídeos em breve</div>
        </div>
      </div>

    </main>
  </div>
</div>

<footer class="rodape">
  <p>Follow us:</p>
  <div class="redes">
    <a href="#">Instagram</a>
    <a href="#">YouTube</a>
    <a href="#">Twitter</a>
    <a href="#">Facebook</a>
  </div>
  <p>© 2026 Portal MMA</p>
</footer>

</body>
</html>
