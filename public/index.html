<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal MMA</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topo">Portal MMA</header>

<section class="login">
    <h1>Login</h1>
    <form class="login-form">
        <input type="text" placeholder="Usuário" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>
</section>

<div class="layout">

    <aside class="menu">
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Serviços</a>
        <a href="#">Contato</a>
        <a href="#">Blog</a>
    </aside>

    <main class="conteudo">

        <div class="banner">MMA Highlights</div>

        <h2>Seção 1</h2>
        <div class="blocos">
            <div class="bloco">
                <h3>ILIA TOPURIA</h3>
                <a href="https://www.espn.com.br/mma/lutador/_/id/4350812/ilia-topuria">Ver perfil</a>
            </div>

            <div class="bloco">
                <h3>CHARLES DO BRONX</h3>
                <a href="https://www.espn.com.br/mma/lutador/_/id/2504169/charles-oliveira">Ver perfil</a>
            </div>

            <div class="bloco">
                <h3>MMA CONTENT</h3>
                Highlights e informações
            </div>
        </div>

        <h2>Seção 2</h2>
        <div class="blocos">
            <div class="bloco">
                <iframe width="100%" height="150"
                src="https://www.youtube.com/embed/R1XTF1Eyp4k?si=vS8kNw9bmNOLXS3G"></iframe>
            </div>

            <div class="bloco">
                <iframe width="100%" height="150"
                src="https://www.youtube.com/embed/wqbo2qJeRYg?si=7mekpt9ojkFrzfOj"></iframe>
            </div>

            <div class="bloco">Mais vídeos em breve</div>
        </div>

    </main>

</div>

<footer class="rodape">
    <p>Follow us:</p>
    <div class="redes">
        <a href="#">Instagram</a>
        <a href="#">YouTube</a>
        <a href="#">Twitter</a>
        <a href="#">Facebook</a>
    </div>
    <p>© 2026 Portal MMA</p>
</footer>

</body>
</html>
